name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm infrastructure destruction'
        required: true
        type: string

env:
  AWS_REGION: eu-west-2
  TF_WORKING_DIR: infra/terraform

permissions:
  id-token: write
  contents: read

jobs:
  validate-confirmation:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        if: ${{ github.event.inputs.confirm != 'destroy' }}
        run: |
          echo "❌ Confirmation failed. You must type 'destroy' to confirm."
          echo "   You entered: '${{ github.event.inputs.confirm }}'"
          exit 1

      - name: Confirmation accepted
        run: |
          echo "⚠️  Destruction confirmed. Proceeding with infrastructure teardown..."

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: validate-confirmation
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Force unlock Terraform state if locked
        run: |
          # Clean up any stale locks from previous failed runs BEFORE terraform init
          aws dynamodb delete-item --table-name attendancems-terraform-locks \
            --key '{"LockID":{"S":"attendancems-terraform-state/prod/terraform.tfstate"}}' 2>/dev/null || true
          echo "✅ Cleared any stale state locks"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Delete Route53 DNS records before destroy
        run: |
          echo "🗑️ Cleaning up Route53 DNS records..."
          
          # Get the hosted zone ID for zainecs.com
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name zainecs.com \
            --query 'HostedZones[0].Id' \
            --output text 2>/dev/null | sed 's|/hostedzone/||' || echo "")
          
          if [ -n "$ZONE_ID" ] && [ "$ZONE_ID" != "None" ]; then
            echo "  Found hosted zone: $ZONE_ID"
            
            # Delete the A record for tm.zainecs.com
            echo "  Deleting A record for tm.zainecs.com..."
            RECORD_SET=$(aws route53 list-resource-record-sets \
              --hosted-zone-id "$ZONE_ID" \
              --query "ResourceRecordSets[?Name=='tm.zainecs.com.']" \
              --output json 2>/dev/null || echo "[]")
            
            if [ "$RECORD_SET" != "[]" ] && [ -n "$RECORD_SET" ]; then
              # Create change batch to delete the record
              aws route53 change-resource-record-sets \
                --hosted-zone-id "$ZONE_ID" \
                --change-batch '{
                  "Changes": [{
                    "Action": "DELETE",
                    "ResourceRecordSet": '"$RECORD_SET"'[0]
                  }]
                }' 2>/dev/null || echo "  Record may already be deleted"
              echo "  ✅ A record deleted"
            else
              echo "  No A record found for tm.zainecs.com"
            fi
            
            # Delete any ACM validation CNAME records
            echo "  Deleting ACM validation records..."
            VALIDATION_RECORDS=$(aws route53 list-resource-record-sets \
              --hosted-zone-id "$ZONE_ID" \
              --query "ResourceRecordSets[?Type=='CNAME' && contains(Name, '_acm-challenge')]" \
              --output json 2>/dev/null || echo "[]")
            
            if [ "$VALIDATION_RECORDS" != "[]" ] && [ -n "$VALIDATION_RECORDS" ]; then
              echo "$VALIDATION_RECORDS" | jq -c '.[]' | while read record; do
                aws route53 change-resource-record-sets \
                  --hosted-zone-id "$ZONE_ID" \
                  --change-batch '{
                    "Changes": [{
                      "Action": "DELETE",
                      "ResourceRecordSet": '"$record"'
                    }]
                  }' 2>/dev/null || true
              done
              echo "  ✅ Validation records deleted"
            else
              echo "  No validation records found"
            fi
          else
            echo "  Hosted zone not found or already cleaned"
          fi
          echo "✅ Route53 cleanup complete"

      - name: Save latest RDS snapshot and clean up old ones
        run: |
          echo "📸 Finding and preserving latest RDS snapshot..."
          
          # Get all manual snapshots for our DB, sorted by creation time
          SNAPSHOTS=$(aws rds describe-db-snapshots \
            --query 'DBSnapshots[?DBInstanceIdentifier==`attendancems-db` && SnapshotType==`manual`].DBSnapshotIdentifier' \
            --output text 2>/dev/null || echo "")
          
          LATEST_SNAPSHOT=$(aws rds describe-db-snapshots \
            --db-instance-identifier attendancems-db \
            --snapshot-type manual \
            --query 'DBSnapshots | sort_by(@, &SnapshotCreateTime) | [-1].DBSnapshotIdentifier' \
            --output text 2>/dev/null || echo "none")
          
          if [ "$LATEST_SNAPSHOT" != "none" ] && [ "$LATEST_SNAPSHOT" != "None" ] && [ -n "$LATEST_SNAPSHOT" ]; then
            echo "📸 Latest snapshot to preserve: $LATEST_SNAPSHOT"
            
            # Store in SSM for rebuild
            aws ssm put-parameter \
              --name "/attendancems/latest-db-snapshot" \
              --value "$LATEST_SNAPSHOT" \
              --type String \
              --overwrite || true
            echo "✅ Snapshot identifier saved to SSM"
            
            # Delete ALL OTHER manual snapshots to save storage costs
            echo "🗑️ Cleaning up old manual snapshots..."
            for snap in $SNAPSHOTS; do
              if [ "$snap" != "$LATEST_SNAPSHOT" ]; then
                echo "  Deleting old snapshot: $snap"
                aws rds delete-db-snapshot --db-snapshot-identifier "$snap" 2>/dev/null || true
              fi
            done
          else
            echo "No manual snapshots found"
          fi
          
          # Also clean up automated snapshots after RDS is deleted (they'll be orphaned)
          echo "Note: Automated backups will be deleted when RDS instance is destroyed"

      - name: Terraform Plan Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -destroy -out=tfplan -lock-timeout=2m

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -lock-timeout=2m tfplan

      - name: Clean up ECR images to stop storage costs
        if: always()
        run: |
          echo "🗑️ Cleaning up ECR images..."
          
          # Delete all images from ECR repository
          IMAGES=$(aws ecr list-images --repository-name attendancems-app \
            --query 'imageIds[*]' --output json 2>/dev/null || echo "[]")
          
          if [ "$IMAGES" != "[]" ] && [ -n "$IMAGES" ]; then
            echo "  Found images to delete"
            aws ecr batch-delete-image \
              --repository-name attendancems-app \
              --image-ids "$IMAGES" 2>/dev/null || true
            echo "✅ ECR images deleted"
          else
            echo "  No ECR images found or repository doesn't exist"
          fi

      - name: Clean up CloudWatch Log Groups
        if: always()
        run: |
          echo "🗑️ Cleaning up CloudWatch Log Groups..."
          
          # Delete ECS log group
          aws logs delete-log-group --log-group-name /ecs/attendancems 2>/dev/null || true
          
          # Delete any other attendancems log groups
          LOG_GROUPS=$(aws logs describe-log-groups \
            --log-group-name-prefix /ecs/attendancems \
            --query 'logGroups[*].logGroupName' --output text 2>/dev/null || echo "")
          
          for lg in $LOG_GROUPS; do
            echo "  Deleting log group: $lg"
            aws logs delete-log-group --log-group-name "$lg" 2>/dev/null || true
          done
          echo "✅ CloudWatch Log Groups cleaned up"

      - name: Clean up any remaining RDS snapshots
        if: always()
        run: |
          echo "🗑️ Final cleanup of RDS snapshots (keeping only the preserved one)..."
          
          PRESERVED=$(aws ssm get-parameter --name "/attendancems/latest-db-snapshot" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          
          # Get ALL snapshots (both manual and system)
          ALL_SNAPSHOTS=$(aws rds describe-db-snapshots \
            --query "DBSnapshots[?contains(DBSnapshotIdentifier, 'attendancems')].DBSnapshotIdentifier" \
            --output text 2>/dev/null || echo "")
          
          for snap in $ALL_SNAPSHOTS; do
            if [ "$snap" != "$PRESERVED" ]; then
              echo "  Deleting snapshot: $snap"
              aws rds delete-db-snapshot --db-snapshot-identifier "$snap" 2>/dev/null || true
            else
              echo "  Preserving snapshot: $snap (for data restoration)"
            fi
          done
          echo "✅ RDS snapshot cleanup complete"

      - name: Verify all chargeable resources are destroyed
        if: always()
        run: |
          echo "🔍 Verifying all chargeable resources are destroyed..."
          echo ""
          
          # Check for running ECS tasks
          echo "Checking ECS tasks..."
          ECS_TASKS=$(aws ecs list-tasks --cluster attendancems-cluster --query 'taskArns' --output text 2>/dev/null || echo "")
          if [ -n "$ECS_TASKS" ]; then
            echo "  ⚠️  WARNING: Found running ECS tasks: $ECS_TASKS"
          else
            echo "  ✅ No ECS tasks running"
          fi
          
          # Check for ALBs
          echo "Checking Application Load Balancers..."
          ALBS=$(aws elbv2 describe-load-balancers --query 'LoadBalancers[?contains(LoadBalancerName, `attendancems`)].LoadBalancerArn' --output text 2>/dev/null || echo "")
          if [ -n "$ALBS" ]; then
            echo "  ⚠️  WARNING: Found ALBs: $ALBS"
          else
            echo "  ✅ No ALBs found"
          fi
          
          # Check for NAT Gateways
          echo "Checking NAT Gateways..."
          NAT_GWS=$(aws ec2 describe-nat-gateways --filter "Name=tag:Name,Values=*attendancems*" --query 'NatGateways[?State==`available`].NatGatewayId' --output text 2>/dev/null || echo "")
          if [ -n "$NAT_GWS" ]; then
            echo "  ⚠️  WARNING: Found NAT Gateways: $NAT_GWS"
          else
            echo "  ✅ No NAT Gateways found"
          fi
          
          # Check for Elastic IPs
          echo "Checking Elastic IPs..."
          EIPS=$(aws ec2 describe-addresses --filters "Name=tag:Name,Values=*attendancems*" --query 'Addresses[*].AllocationId' --output text 2>/dev/null || echo "")
          if [ -n "$EIPS" ]; then
            echo "  ⚠️  WARNING: Found Elastic IPs: $EIPS"
          else
            echo "  ✅ No Elastic IPs found"
          fi
          
          # Check for RDS instances
          echo "Checking RDS instances..."
          RDS_INSTANCES=$(aws rds describe-db-instances --query 'DBInstances[?DBInstanceIdentifier==`attendancems-db`].DBInstanceIdentifier' --output text 2>/dev/null || echo "")
          if [ -n "$RDS_INSTANCES" ]; then
            echo "  ⚠️  WARNING: Found RDS instances: $RDS_INSTANCES"
          else
            echo "  ✅ No RDS instances found"
          fi
          
          # Check for VPCs
          echo "Checking VPCs..."
          VPCS=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=*attendancems*" --query 'Vpcs[*].VpcId' --output text 2>/dev/null || echo "")
          if [ -n "$VPCS" ]; then
            echo "  ⚠️  WARNING: Found VPCs: $VPCS"
          else
            echo "  ✅ No VPCs found"
          fi
          
          echo ""
          echo "✅ Resource verification complete"

      - name: Clean up Terraform state for fresh rebuild
        if: success()
        run: |
          # Delete the state file so next apply starts fresh
          aws s3 rm s3://attendancems-terraform-state/prod/terraform.tfstate || true
          # Clean up old state versions to reduce S3 storage costs
          aws s3api list-object-versions --bucket attendancems-terraform-state --prefix prod/ \
            --query 'Versions[?IsLatest==`false`].[Key,VersionId]' --output text 2>/dev/null | \
            while read key version; do
              if [ -n "$key" ] && [ -n "$version" ]; then
                aws s3api delete-object --bucket attendancems-terraform-state --key "$key" --version-id "$version" 2>/dev/null || true
              fi
            done
          # Clean up delete markers
          aws s3api list-object-versions --bucket attendancems-terraform-state --prefix prod/ \
            --query 'DeleteMarkers[*].[Key,VersionId]' --output text 2>/dev/null | \
            while read key version; do
              if [ -n "$key" ] && [ -n "$version" ]; then
                aws s3api delete-object --bucket attendancems-terraform-state --key "$key" --version-id "$version" 2>/dev/null || true
              fi
            done
          # Clean up any stale DynamoDB entries
          aws dynamodb delete-item --table-name attendancems-terraform-locks \
            --key '{"LockID":{"S":"attendancems-terraform-state/prod/terraform.tfstate"}}' || true
          aws dynamodb delete-item --table-name attendancems-terraform-locks \
            --key '{"LockID":{"S":"attendancems-terraform-state/prod/terraform.tfstate-md5"}}' || true
          echo "✅ Terraform state cleaned up for fresh rebuild"

      - name: Destruction summary
        if: always()
        run: |
          echo "## 🗑️ Infrastructure Destruction" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All AWS infrastructure has been destroyed." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Destruction may have partially failed. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
